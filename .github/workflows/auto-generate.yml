name: Pharma DX Journal - Auto Generate

on:
  schedule:
    - cron: '0 23 * * *'   # JST 8:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: blog_engineをチェックアウト
        uses: actions/checkout@v4
        with:
          repository: MuscleLove-777/blog-engine
          path: blog_engine
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージをインストール
        run: pip install -r blog_engine/requirements.txt

      - name: 記事を自動生成してサイトをビルド
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_and_build.py

      - name: 生成した記事をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "記事自動生成: $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: GitHub Pages にデプロイ
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/site
          publish_branch: gh-pages
